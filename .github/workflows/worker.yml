name: Achaqui Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps for Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 \
            libcairo2 libx11-xcb1 libxcb-dri3-0 || true
          sudo apt-get install -y --no-install-recommends libasound2t64 || \
          sudo apt-get install -y --no-install-recommends libasound2 || true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run worker (4 min loop)
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          RUN_DURATION: "230"
        run: python worker.py
